apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../ate-api-server.yaml
  - ../ate-controller.yaml
  - ./atelet
  - ../atenet-dns.yaml
  - ../atenet-router.yaml
  - ../valkey.yaml

patches:
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: ate-api-server-deployment
      namespace: ate-system
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/env/4/value
        value: http://localhost:4317
      - op: replace
        path: /spec/template/spec/volumes/0
        value:
          name: servicedns
          secret:
            secretName: servicedns-credential-bundle
            items:
            - key: credential-bundle.pem
              path: credential-bundle.pem
      - op: replace
        path: /spec/template/spec/volumes/4
        value:
          name: workerpool-ca-certs
          secret:
            secretName: workerpool-ca-certs
            items:
            - key: trust-bundle.pem
              path: trust-bundle.pem
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: atenet-router
      namespace: ate-system
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/env/4/value
        value: http://localhost:4317
      - op: replace
        path: /spec/template/spec/volumes/1
        value:
          name: servicedns
          secret:
            secretName: servicedns-credential-bundle
            items:
            - key: credential-bundle.pem
              path: credential-bundle.pem
  - target:
      group: apps
      version: v1
      kind: StatefulSet
      name: valkey-cluster
      namespace: ate-system
    patch: |-
      - op: replace
        path: /spec/template/spec/volumes/1
        value:
          name: servicedns
          secret:
            secretName: servicedns-credential-bundle
            items:
            - key: credential-bundle.pem
              path: credential-bundle.pem
  - target:
      group: batch
      version: v1
      kind: Job
      name: valkey-cluster-init
      namespace: ate-system
    patch: |-
      - op: replace
        path: /spec/template/spec/volumes/0
        value:
          name: servicedns
          secret:
            secretName: servicedns-credential-bundle
            items:
            - key: credential-bundle.pem
              path: credential-bundle.pem
