apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../atelet.yaml

patches:
  - patch: |-
      apiVersion: v1
      kind: ServiceAccount
      metadata:
        name: atelet
        namespace: ate-system
        annotations:
          azure.workload.identity/client-id: ${AZURE_ATELET_CLIENT_ID}
  - target:
      group: apps
      version: v1
      kind: DaemonSet
      name: atelet
      namespace: ate-system
    patch: |-
      - op: add
        path: /spec/template/metadata/labels/azure.workload.identity~1use
        value: "true"
      - op: replace
        path: /spec/template/spec/containers/0/args/0
        value: --gcp-auth-for-image-pulls=false
      - op: add
        path: /spec/template/spec/containers/0/args/-
        value: --azure-auth-for-image-pulls=true
      - op: replace
        path: /spec/template/spec/containers/0/env/5/value
        value: http://localhost:4317
      - op: replace
        path: /spec/template/spec/containers/0/env/6/value
        value: azure
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: AZURE_STORAGE_ACCOUNT_NAME
          value: ${AZURE_STORAGE_ACCOUNT_NAME}
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: AZURE_CONTAINER_REGISTRY_NAME
          value: ${AZURE_CONTAINER_REGISTRY_NAME}
